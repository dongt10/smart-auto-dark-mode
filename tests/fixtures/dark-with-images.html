<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Fixture: dark page with images</title>
<style>
  body { background: #1a1a1a; color: #f5f5f5; font-family: -apple-system, sans-serif; margin: 0; padding: 24px; }
  main { display: grid; grid-template-columns: 200px 1fr; gap: 18px; max-width: 720px; }
  img { width: 200px; height: 200px; display: block; background: linear-gradient(45deg, #ffd700, #ff6347); }
  h2 { color: #cfe; margin-top: 0; }
</style>
</head>
<body>
  <main>
    <img alt="thumbnail">
    <div>
      <h2>Dark Photo Gallery</h2>
      <p>A dark site that displays user photos. After detection, this should be classified as already dark — no inversion should be applied.</p>
    </div>
  </main>
</body></html>
