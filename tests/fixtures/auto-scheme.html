<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Fixture: prefers-color-scheme aware</title>
<meta name="color-scheme" content="light dark">
<style>
  /* Default = light. Switches to dark only when prefers-color-scheme: dark. */
  :root { color-scheme: light dark; }
  body { background: #ffffff; color: #111; font-family: -apple-system, sans-serif; margin: 0; padding: 24px; }
  a { color: #1a73e8; }

  @media (prefers-color-scheme: dark) {
    body { background: #0d1117; color: #e6edf3; }
    a { color: #58a6ff; }
  }
</style>
</head>
<body>
  <h1>prefers-color-scheme aware</h1>
  <p>This page changes color based on the OS / extension hint. If the extension's <code>color-scheme: dark</code> hint propagates, this page should appear dark even before the inversion fallback runs.</p>
  <p><a href="#">a sample link</a></p>
</body></html>
