<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Fixture: classic light page</title>
<style>
  body { background: #ffffff; color: #222; font-family: -apple-system, sans-serif; margin: 0; padding: 24px; }

</style>
</head>
<body>
  <header><h1>Classic Light Page</h1><nav><a href="#">Home</a> · <a href="#">About</a></nav></header>
  <main>
    <p>This is a typical light-themed page: white background, dark text, blue links. The detector should classify this as <b>light</b>.</p>
    <img class="hero" alt="hero">
    <p>More content here so the page has substance.</p>
    <button>Action</button>
  </main>
</body></html>
